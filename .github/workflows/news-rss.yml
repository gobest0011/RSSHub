name: RSS新闻推送
on:
  schedule:
    - cron: '0 8,18 * * *'
  workflow_dispatch:

jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 获取新闻
        run: |
          RSSHUB="https://rss-hub-rho-sand.vercel.app"
          
          {
            echo "今日新闻摘要"
            echo "===================="
            echo ""
            
            # 36氪（稳定的）
            echo "【36氪快讯】"
            curl -sL "$RSSHUB/36kr/newsflashes" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 知乎热榜
            echo "【知乎热榜】"
            curl -sL "$RSSHUB/zhihu/hot-list" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 网易科技
            echo "【网易科技】"
            curl -sL "$RSSHUB/163/tech" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # IT之家
            echo "【IT之家】"
            curl -sL "$RSSHUB/ithome" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 少数派
            echo "【少数派】"
            curl -sL "$RSSHUB/sspai" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 虎嗅
            echo "【虎嗅】"
            curl -sL "$RSSHUB/huxiu" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 爱范儿
            echo "【爱范儿】"
            curl -sL "$RSSHUB/ifanr" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 微博热搜（备用）
            echo "【微博热搜】"
            curl -sL "$RSSHUB/weibo/hotsearch" 2>/dev/null | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
          } > news.txt

      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 每日新闻摘要
          to: 313413666@qq.com
          from: 新闻助手 <${{ secrets.MAIL_USER }}>
          body: file://news.txt
