name: RSS新闻推送
on:
  schedule:
    - cron: '0 8,18 * * *'
  workflow_dispatch:

jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 获取新闻
        run: |
          RSSHUB="https://rss-hub-rho-sand.vercel.app"
          
          {
            echo "今日新闻摘要"
            echo "===================="
            echo ""
            
            # 微博热搜
            echo "【微博热搜 Top 10】"
            curl -s "$RSSHUB/weibo/hotsearch" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 百度热搜
            echo "【百度热搜 Top 10】"
            curl -s "$RSSHUB/baidu/hotwords" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 36氪
            echo "【36氪快讯】"
            curl -s "$RSSHUB/36kr/newsflashes" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 虎嗅
            echo "【虎嗅】"
            curl -s "$RSSHUB/huxiu" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 爱范儿
            echo "【爱范儿】"
            curl -s "$RSSHUB/ifanr" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # IT之家
            echo "【IT之家】"
            curl -s "$RSSHUB/ithome" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 汽车之家
            echo "【汽车之家】"
            curl -s "$RSSHUB/autohome" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
            # 懂车帝
            echo "【懂车帝】"
            curl -s "$RSSHUB/dongche" | grep -o '<title>[^<]*</title>' | sed 's/<title>//g' | sed 's/<\/title>//g' | tail -n +2 | head -10
            echo ""
            
          } > news.txt

      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 每日新闻摘要
          to: 313413666@qq.com
          from: 新闻助手 <${{ secrets.MAIL_USER }}>
          body: file://news.txt
